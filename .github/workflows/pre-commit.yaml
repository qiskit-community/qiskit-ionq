name: pre-commit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pre-commit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
          persist-credentials: false

      - name: setup-uv
        uses: astral-sh/setup-uv@v6

      - name: Run pre-commit
        run: uvx pre-commit run --all-files --show-diff-on-failure
