name: pr
on:
  pull_request: {}
  push:
    branches:
      - main
permissions:
  contents: read
jobs:
  tests:
    name: python-${{ matrix.python-version }}-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        os: ["macOS-latest", "ubuntu-latest", "windows-latest"]
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: setup-uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: install-requirements
        run: uv sync --locked --no-default-groups --group test
      - name: run-tests
        run: uv run --no-sync pytest --cov-fail-under=80
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: setup-uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
      - name: install-requirements
        run: uv sync --locked --no-default-groups --group test
      - name: lint
        run: |
          uv run --no-sync pylint -rn qiskit_ionq
          # Tests lint with the same config, minus the 50-char cap on function names:
          uv run --no-sync pylint -rn --function-rgx='[a-z_][a-z0-9_]+$' test
          uv run --no-sync python tools/verify_headers.py qiskit_ionq test
  docs:
    name: docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: setup-uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"
      - name: install-requirements
        run: uv sync --locked --no-default-groups --group docs
      - name: docs
        run: uv run --no-sync make html
      - uses: actions/upload-artifact@v4
        if: ${{ github.event_name == 'pull_request' }}
        with:
          name: html_docs
          path: build/html
