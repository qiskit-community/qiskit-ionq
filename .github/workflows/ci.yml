name: pr
on:
  pull_request: {}
  push:
    branches:
      - main
permissions:
  contents: read
jobs:
  tests:
    name: python-${{ matrix.python-version }}-qiskit-${{ matrix.qiskit-version }}-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: ["macOS-latest", "ubuntu-latest", "windows-latest"]
        tox-env:
          [
            "py310-qiskit1",
            "py310-qiskit2",
            "py311-qiskit1",
            "py311-qiskit2",
            "py312-qiskit1",
            "py312-qiskit2",
            "py313-qiskit1",
            "py313-qiskit2",
          ]
        include:
          - tox-env: "py310-qiskit1"
            python-version: "3.10"
            qiskit-version: "1"
          - tox-env: "py310-qiskit2"
            python-version: "3.10"
            qiskit-version: "2"
          - tox-env: "py311-qiskit1"
            python-version: "3.11"
            qiskit-version: "1"
          - tox-env: "py311-qiskit2"
            python-version: "3.11"
            qiskit-version: "2"
          - tox-env: "py312-qiskit1"
            python-version: "3.12"
            qiskit-version: "1"
          - tox-env: "py312-qiskit2"
            python-version: "3.12"
            qiskit-version: "2"
          - tox-env: "py313-qiskit1"
            python-version: "3.13"
            qiskit-version: "1"
          - tox-env: "py313-qiskit2"
            python-version: "3.13"
            qiskit-version: "2"
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: setup-python-${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: install-requirements
        run: |
          python -m pip install --upgrade pip tox
      - name: run-tests
        run: tox -e ${{ matrix.tox-env }}
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: setup-python-3.12
        uses: actions/setup-python@v5
        with:
          python-version: 3.12
      - name: install-requirements
        run: |
          python -m pip install --upgrade pip tox
      - name: lint
        run: tox -e lint
  docs:
    name: docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: setup-python-3.13
        uses: actions/setup-python@v5
        with:
          python-version: 3.13
      - name: install-requirements
        run: |
          python -m pip install --upgrade pip tox
      - name: docs
        run: tox -e docs
      - uses: actions/upload-artifact@v4
        if: ${{ github.event_name == 'pull_request' }}
        with:
          name: html_docs
          path: build/html
